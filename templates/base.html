<!DOCTYPE html>
<html lang="en">
<head>
    <title>AGP Children's Ministry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='attendance.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-brand">AGP Children's Ministry</div>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation menu">☰</button>
        <div class="nav-links" id="nav-links">
            <a href="/">Home</a>
            <a href="/attendance">Take Attendance</a>
            <a href="/roster">Manage Roster</a>
            <a href="/history">Attendance History</a>
            <a href="/logout" class="nav-logout">Log Out</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleNav() {
            const links = document.getElementById('nav-links');
            links.classList.toggle('open');
        }

        // Close nav when a link is clicked (for mobile)
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('nav-links').classList.remove('open');
            });
        });

    </script>
</body>
</html>
