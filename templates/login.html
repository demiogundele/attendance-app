<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login — AGP Children's Ministry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='attendance.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-main">
        <h1>Welcome</h1>
        <h4 class="login-subtitle">AGP Children's Ministry Attendance Tracker</h4>

        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <label>Password
                <input type="password" name="password" placeholder="Enter password" required autofocus>
            </label>
            <button type="submit">Login</button>
        </form>
    </main>
</body>
</html>
